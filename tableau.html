<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Tableau filtrable</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }

    h2 {
      margin-bottom: 15px;
    }

    .filters {
      margin-bottom: 15px;
    }

    .filters button {
      padding: 8px 14px;
      margin-right: 8px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #ddd;
    }

    .filters button.active {
      background: #007bff;
      color: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      padding: 12px;
      border: 1px solid #ccc;
      text-align: left;
    }

    th {
      background: #333;
      color: white;
    }

    .tag {
      padding: 4px 10px;
      border-radius: 999px;
      color: white;
      font-size: 12px;
      font-weight: bold;
    }

    .low {
      background: #28a745;
    }

    .mid {
      background: #ff9800;
    }

    .high {
      background: #dc3545;
    }
  </style>
</head>
<body>

  <h2>Liste des tâches</h2>

  <!-- FILTRES -->
  <div class="filters">
    <button class="active" onclick="filterTable('all', this)">Toutes</button>
    <button onclick="filterTable('low', this)">Low</button>
    <button onclick="filterTable('mid', this)">Mid</button>
    <button onclick="filterTable('high', this)">High</button>
  </div>

  <!-- TABLE -->
  <table>
    <thead>
      <tr>
        <th>Nom tâche</th>
        <th>Priorité</th>
        <th>À faire avant</th>
      </tr>
    </thead>

    <tbody id="taskTable">
      <tr data-priority="low">
        <td>Peinture</td>
        <td><span class="tag low">LOW</span></td>
        <td>20 octobre</td>
      </tr>

      <tr data-priority="mid">
        <td>Nettoyage</td>
        <td><span class="tag mid">MID</span></td>
        <td>15 octobre</td>
      </tr>

      <tr data-priority="high">
        <td>Rapport client</td>
        <td><span class="tag high">HIGH</span></td>
        <td>10 octobre</td>
      </tr>
    </tbody>
  </table>

  <script>
    function filterTable(priority, button) {
      const rows = document.querySelectorAll("#taskTable tr");
      const buttons = document.querySelectorAll(".filters button");

      // Active button
      buttons.forEach(btn => btn.classList.remove("active"));
      button.classList.add("active");

      // Filter rows
      rows.forEach(row => {
        if (
          priority === "all" ||
          row.dataset.priority === priority
        ) {
          row.style.display = "";
        } else {
          row.style.display = "none";
        }
      });
    }
  </script>

</body>
</html>
